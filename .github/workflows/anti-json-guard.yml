name: Anti JSON BDD Guard

"on":
  push:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run anti-JSON guard
        run: |
          chmod +x guard-no-json-pseudo-bdd.sh
          ./guard-no-json-pseudo-bdd.sh