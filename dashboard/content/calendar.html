
          <div class="">
            <div class="page-title">
              <div class="title_left">
                <h3>Calendar <small>Professional scheduling interface</small></h3>
              </div>

              <div class="title_right">
                <div class="col-md-5 col-sm-5 mb-3 float-end top_search">
                  <div class="input-group search-bar-fix">
                    <input type="text" class="form-control" placeholder="Search events...">
                    <button class="btn btn-outline-secondary" type="button">
                      <i class="fas fa-search"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="clearfix"></div>

            <div class="row">
              <!-- Calendar Panel -->
              <div class="col-md-12">
                <div class="x_panel">
                  <div class="x_title">
                    <h4>Event Calendar <small>Click dates to add events, click events to edit</small></h4>
                    <ul class="nav navbar-right panel_toolbox">
                      <li><a class="collapse-link"><i class="fas fa-chevron-up"></i></a>
                      <li class="dropdown">
                        <a href="#" class="dropdown-toggle" data-bs-toggle="dropdown" role="button" aria-expanded="false"><i class="fas fa-wrench"></i></a>
                        <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                            <a class="dropdown-item" href="#"><i class="fas fa-download me-2"></i>Export Calendar</a>
                            <a class="dropdown-item" href="#"><i class="fas fa-upload me-2"></i>Import Events</a>
                            <div class="dropdown-divider"></div>
                            <a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i>Settings</a>
                          </div>
                      <li><a class="btn-btn-close-link"><i class="fas fa-times"></i></a>
                    </ul>
                    <div class="clearfix"></div>
                  </div>
                  <div class="x_content">
                    <div class="row">
                      <!-- Quick Actions -->
                      <div class="col-md-12 mb-3">
                        <div class="d-flex flex-wrap gap-2">
                          <button type="button" class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#CalenderModalNew">
                            <i class="fas fa-plus me-1"></i> New Event
                          </button>
                          <button type="button" class="btn btn-primary btn-sm" onclick="window.calendar && window.calendar.changeView('dayGridMonth')">
                            <i class="fas fa-calendar me-1"></i> Month View
                          </button>
                          <button type="button" class="btn btn-primary btn-sm" onclick="window.calendar && window.calendar.changeView('timeGridWeek')">
                            <i class="fas fa-calendar-week me-1"></i> Week View
                          </button>
                          <button type="button" class="btn btn-primary btn-sm" onclick="window.calendar && window.calendar.changeView('timeGridDay')">
                            <i class="fas fa-calendar-day me-1"></i> Day View
                          </button>
                          <button type="button" class="btn btn-outline-secondary btn-sm" onclick="window.calendar && window.calendar.today()">
                            <i class="fas fa-calendar-check me-1"></i> Today
                          </button>
                        </div>
                      </div>
                      
                      <!-- Calendar -->
                      <div class="col-md-12">
                        <div id='calendar' class="calendar-container"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
