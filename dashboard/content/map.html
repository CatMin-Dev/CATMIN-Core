
        <div class="">
          <div class="page-title">
            <div class="title_left">
              <h3>Vector Maps <small>Leaflet.js</small></h3>
            </div>
          </div>
          <div class="clearfix"></div>
          <div class="row">
            <div class="col-md-12">
              <div class="x_panel">
                <div class="x_title">
                  <h4>World Map</h4>
                  <div class="clearfix"></div>
                </div>
                <div class="x_content">
                  <div id="leaflet-map" style="height: 500px;"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
<script>
    // Initialize Leaflet map when page loads
    document.addEventListener('DOMContentLoaded', async function() {
      try {
        // Load the charts module which includes Leaflet
        const charts = await loadModule('charts');
        
        // Initialize the Leaflet map
        const map = L.map('leaflet-map').setView([40.7128, -74.0060], 4);
        
        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);
        
        // Add some sample markers
        const cities = [
          { name: 'New York', lat: 40.7128, lng: -74.0060 },
          { name: 'London', lat: 51.5074, lng: -0.1278 },
          { name: 'Tokyo', lat: 35.6762, lng: 139.6503 },
          { name: 'Sydney', lat: -33.8688, lng: 151.2093 },
          { name: 'São Paulo', lat: -23.5505, lng: -46.6333 }
        ];
        
        cities.forEach(city => {
          L.marker([city.lat, city.lng])
            .addTo(map)
            .bindPopup(`<b>${city.name}</b><br>Sample location marker`);
        });
        
      } catch (error) {
        document.getElementById('leaflet-map').innerHTML = 
          '<div class="d-flex align-items-center justify-content-center h-100"><div class="text-center"><i class="fas fa-map fa-3x text-muted mb-3"></i><p class="text-muted">Map failed to load</p></div></div>';
      }
    });
  </script>
