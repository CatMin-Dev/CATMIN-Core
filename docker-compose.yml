services:
  catmin:
    build: .
    container_name: catmin-app
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "0"
      DB_DRIVER: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: catmin
      DB_USERNAME: catmin
      DB_PASSWORD: catmin
    volumes:
      - ./storage:/var/www/html/storage
      - ./cache:/var/www/html/cache
      - ./logs:/var/www/html/logs
      - ./sessions:/var/www/html/sessions
      - ./tmp:/var/www/html/tmp
      - ./database:/var/www/html/database
      - ./modules:/var/www/html/modules
    depends_on:
      - db

  db:
    image: mariadb:11
    container_name: catmin-db
    environment:
      MARIADB_DATABASE: catmin
      MARIADB_USER: catmin
      MARIADB_PASSWORD: catmin
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
